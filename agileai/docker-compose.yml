version: '3.8'

services:
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - agileai_network
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/agileai
      - JWT_SECRET=dev_jwt_secret_change_me_in_prod
      - JWT_REFRESH_SECRET=dev_refresh_secret_change_me_in_prod
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - AI_SERVICE_URL=http://ai-service:8001
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - agileai_network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agileai_network

  # PHASE 2 — uncomment this block
  # ai-service:
  #   build:
  #     context: ./ai-service
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8001:8001"
  #   environment:
  #     - API_PORT=8001
  #     - MONGODB_URI=mongodb://mongodb:27017/agileai
  #   depends_on:
  #     - mongodb
  #   networks:
  #     - agileai_network

networks:
  agileai_network:
    driver: bridge

volumes:
  mongodb_data:
